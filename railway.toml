# railway.toml — Configuration de déploiement Railway
[build]
builder = "nixpacks"
buildCommand = "composer install --optimize-autoloader --no-dev && npm install && npm run build && php artisan config:cache && php artisan route:cache && php artisan view:cache"

[deploy]
startCommand = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/up"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "medclinic-web"

[[services]]
name = "medclinic-scheduler"
startCommand = "php artisan schedule:work"
